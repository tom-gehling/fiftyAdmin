name: Deploy to Prod

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Build and deploy to weeklyfifty-7617b
    runs-on: ubuntu-latest
    # GitHub environment with required reviewer rule — pauses for manual approval
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install web deps
        run: npm ci

      - name: Write environment.prod.ts from secret
        run: echo "$ENV_FILE" > src/environments/environment.prod.ts
        env:
          ENV_FILE: ${{ secrets.ENVIRONMENT_TS_PROD }}

      - name: Write environment.ts placeholder (build needs both — production config swaps to prod via fileReplacements)
        run: cp src/environments/environment.example.ts src/environments/environment.ts

      - name: Build web (production config — swaps to environment.prod.ts)
        run: npx ng build --configuration production

      - name: Install functions deps
        working-directory: functions
        run: npm ci

      - name: Build functions
        working-directory: functions
        run: npm run build

      - name: Authenticate to Firebase
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to prod
        run: firebase deploy --project prod --only hosting,functions,firestore,storage --non-interactive --force
