name: PR Checks

on:
  pull_request:
    branches: [dev, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  checks:
    name: Lint, type-check, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install web deps
        run: npm ci

      - name: Lint web
        run: npx eslint . --max-warnings=0
        continue-on-error: true # Lint failures shouldn't block PRs yet — flip to false once clean

      - name: Write placeholder env files (so build can resolve imports)
        run: |
          cp src/environments/environment.example.ts src/environments/environment.ts
          cp src/environments/environment.example.ts src/environments/environment.prod.ts

      - name: Type-check + build (dev-deploy config)
        run: npx ng build --configuration dev-deploy

      - name: Install functions deps
        working-directory: functions
        run: npm ci

      - name: Build functions
        working-directory: functions
        run: npm run build
