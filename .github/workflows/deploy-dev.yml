name: Deploy to Dev

on:
  push:
    branches: [dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    name: Build and deploy to weeklyfifty-dev
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install web deps
        run: npm ci

      - name: Write environment.ts from secret
        run: echo "$ENV_FILE" > src/environments/environment.ts
        env:
          ENV_FILE: ${{ secrets.ENVIRONMENT_TS_DEV }}

      - name: Verify env file + service account secret are non-empty
        run: |
          ENV_BYTES=$(wc -c < src/environments/environment.ts)
          echo "environment.ts size: $ENV_BYTES bytes"
          if [ "$ENV_BYTES" -lt 100 ]; then
            echo "::error::environment.ts is suspiciously small (<100 bytes). Is the ENVIRONMENT_TS_DEV secret set?"
            echo "--- file preview (first line only) ---"
            head -n 1 src/environments/environment.ts
            exit 1
          fi
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT_DEV secret is empty."
            exit 1
          fi
          # Also needs an environment.prod.ts for the imports graph even though dev-deploy doesn't replace it
          if [ ! -f src/environments/environment.prod.ts ]; then
            cp src/environments/environment.example.ts src/environments/environment.prod.ts
            echo "wrote placeholder environment.prod.ts"
          fi

      - name: Build web (dev-deploy config — uses environment.ts)
        run: npx ng build --configuration dev-deploy

      - name: Install functions deps
        working-directory: functions
        run: npm ci

      - name: Build functions
        working-directory: functions
        run: npm run build

      - name: Authenticate to Firebase
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to dev
        run: firebase deploy --project dev --only hosting,functions,firestore,storage --non-interactive --force
