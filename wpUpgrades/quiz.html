<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Cache-control" content="No-Cache" />
    <title>The Weekly Fifty</title>
    <style>
      :root {
        --tertiary: #4cfbab;
        --secondary: #677c73;
        --primary: #fbe2df;
        --font: Helvetica, Arial, sans-serif;
        --header: 25px;
        --normal: 22px;
        --smaller: 18px;
        --transition: 0.3s;
      }

      body {
        background-color: var(--secondary);
      }

      #load {
        color: var(--primary) !important;
        background-color: var(--secondary) !important;
        font-family: var(--font) !important;
        font-size: var(--normal) !important;
        font-weight: 500 !important;
        transition: var(--transition) !important;
        padding-bottom: 10px !important;
        display: flex;
        flex-direction: column;
      }

      .closebtn {
        color: var(--tertiary);
        margin-bottom: 10px;
        cursor: pointer;
      }

      #openBtn {
        color: var(--tertiary);
        font-size: 60px;
        padding: 10px;
        cursor: pointer;
      }

      .logo {
        width: 100%;
        justify-content: center;
        margin-bottom: 30px;
      }

      .topContainer {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .info-button {
        background-color: var(--secondary) !important;
        font-family: var(--font) !important;
        font-size: var(--smaller) !important;
        font-weight: 500 !important;
        color: var(--primary) !important;
        cursor: pointer !important;
        padding: 15px !important;
        padding-top: 1% !important;
        padding-bottom: 1% !important;
        vertical-align: centre !important;
        text-align: left !important;
        height: 70% !important;
        border: none !important;
        outline: none !important;
        transition: var(--transition) !important;
        width: auto !important;
        margin-right: 10px !important;
        line-height: 130% !important;
      }

      .modal {
        font-family: var(--font);
        display: none;
        position: fixed;
        z-index: 1;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgba(0, 0, 0, 0.8);
      }

      .modal-content {
        background-color: white;
        margin: 15% auto;
        padding: 20px;
        font-size: var(--smaller);
        font-family: var(--font);
        width: 80%;
      }

      .close {
        color: #aaa;
        float: right;
        font-size: 38px;
        font-weight: bold;
      }

      .close:hover,
      .close:focus {
        color: var(--secondary);
        text-decoration: none;
        cursor: pointer;
      }

      .info {
        text-align: center;
        color: var(--secondary);
        font-family: var(--font);
        font-weight: 300 !important;
        line-height: 200%;
      }

      .toggleButtonContainerWrapper {
        font-family: var(--font) !important;
        display: flex;
        flex-direction: row;
        width: 15%;
        align-items: center;
        margin-left: auto;
      }

      .toggleButtonContainer {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-size: var(--smaller) !important;
        font-weight: 100 !important;
        padding: 5px !important;
        width: auto !important;
      }

      .toggleWithValues {
        display: flex;
        align-items: center;
        flex-direction: column;
      }

      .toggleButton {
        position: relative;
        width: 60px !important;
        height: 24px !important;
        display: flex;
        justify-content: flex-end;
        align-items: center;
      }

      .toggleButtonLabel {
        font-size: 16px;
        font-weight: 500;
        text-align: center;
        padding: 10px;
        line-height: 130%;
      }

      .toggleButton input[type="checkbox"] {
        display: none;
      }

      .slider {
        position: absolute;
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        background-color: var(--primary) !important;
        border-radius: 24px !important;
        transition: var(--transition) !important;
        cursor: pointer !important;
      }

      .slider:before {
        position: absolute;
        content: "" !important;
        height: 16px !important;
        width: 16px !important;
        left: 4px !important;
        bottom: 4px !important;
        background-color: var(--secondary) !important;
        border-radius: 50% !important;
        transition: var(--transition) !important;
      }

      input[type="checkbox"]:checked + .slider {
        background-color: var(--primary) !important;
      }

      input[type="checkbox"]:checked + .slider:before {
        transform: translateX(34px) !important;
      }

      .quizContainer {
        width: 100% !important;
      }

      .quizTitle {
        font-size: 38px !important;
        font-family: var(--font);
        color: var(--primary);
        font-weight: 600 !important;
        text-align: center !important;
        padding: 10px;
      }

      .quiz {
        display: none;
      }

      .quiz.active {
        display: block;
      }

      .question {
        width: auto !important;
        justify-self: center !important;
      }

      .questionText {
        display: contents;
      }

      .accordionButton {
        color: var(--primary) !important;
        background-color: var(--secondary) !important;
        border: none !important;
        border-radius: 0px !important;
        text-align: center !important;
        outline: none !important;
        width: 100% !important;
        font-family: var(--font) !important;
        font-size: var(--header) !important;
        font-weight: 400 !important;
        transition: var(--transition) !important;
        padding: 25px !important;
        margin-bottom: 20px !important;
        line-height: 130% !important;
      }

      .accordionButton.active {
        color: var(--secondary) !important;
        background-color: var(--primary) !important;
      }

      .accordionButton p {
        margin: 0 !important;
        display: inline !important;
      }

      .genericButton {
        font-family: var(--font) !important;
        font-weight: 600 !important;
        color: var(--secondary) !important;
        background-color: var(--primary) !important;
        border: 3px solid var(--primary) !important;
        border-radius: 15px !important;
        font-size: var(--normal) !important;
        padding: 15px !important;
        margin: 5px !important;
        transition: var(--transition) !important;
      }

      .genericButton.correct {
        color: var(--primary) !important;
        background-color: var(--secondary) !important;
        border: 3px solid var(--primary) !important;
      }

      .genericButton.incorrect {
        color: var(--primary) !important;
        background-color: var(--secondary) !important;
        border: 3px solid var(--primary) !important;
      }

      .genericButton.reveal {
        background-color: var(--secondary) !important;
        color: var(--primary) !important;
        border: 3px solid var(--primary) !important;
      }

      .dot {
        height: 10px !important;
        width: 10px !important;
        background-color: var(--tertiary) !important;
        border-radius: 50% !important;
        display: inline-block;
        margin-right: 10px !important;
      }

      .dot.removed {
        display: none;
      }

      .panel {
        font-family: var(--font) !important;
        display: none;
        font-size: var(--normal) !important;
        padding-top: 15px !important;
        padding-bottom: 15px !important;
        width: auto !important;
        text-align: center !important;
      }

      .panel.active {
        display: block;
      }

      .panel.answer {
        font-size: var(--header) !important;
        font-weight: 800 !important;
      }

      .panel.answer ul {
        padding: 0;
        margin: 0;
        line-height: 1;
      }

      .panel.answer li {
        margin-top: 10px;
        margin-bottom: 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
        list-style-type: "-";
        width: 100%;
        word-wrap: break-word;
      }

      .score {
        font-family: var(--font) !important;
        color: var(--primary) !important;
        text-align: center !important;
        font-size: var(--header) !important;
        font-weight: 800 !important;
      }

      .quizImage {
        width: 90%;
        align-self: center;
        max-height: 400px;
        object-fit: contain;
        display: block;
        margin-bottom: 20px;
      }

      .quizNotes {
        font-family: var(--font) !important;
        font-size: var(--smaller) !important;
        color: var(--primary) !important;
        text-align: center !important;
        padding: 15px 10px !important;
        line-height: 160% !important;
      }

      @media only screen and (max-width: 800px) {
        .toggleButtonContainerWrapper {
          width: 20%;
        }
      }

      @media only screen and (max-width: 500px) {
        .toggleButtonContainerWrapper {
          width: 30%;
        }
      }
    </style>
  </head>
  <body>
    <div id="load"></div>

    <script>
      var quizzes = [];
      var buttons = [];
      var correctClicked = [];
      var incorrectClicked = [];
      var dotStatus = [];
      var scoreCount = [];
      var totalCount = [];
      var quizSubmitted = [];
      var answerTimestamps = {};

      function isFiftyPlusQuiz() {
        return window.location.pathname.includes('/members/');
      }

      function getSlugFromUrl() {
        var parts = window.location.pathname.replace(/\/$/, '').split('/');
        return parts[parts.length - 1];
      }

      function applyTheme() {
        const theme = quizzes[0]?.theme;
        if (!theme) return;
        const root = document.documentElement;
        if (theme.fontColor) root.style.setProperty('--primary', theme.fontColor);
        if (theme.backgroundColor) {
          root.style.setProperty('--secondary', theme.backgroundColor);
          document.body.style.backgroundColor = theme.backgroundColor;
        }
        if (theme.tertiaryColor) root.style.setProperty('--tertiary', theme.tertiaryColor);
      }

      async function getWordPressUserEmail() {
        try {
          const response = await fetch('/wp-json/wp/v2/users/me', { credentials: 'include' });
          if (!response.ok) return null;
          const data = await response.json();
          return data.email || null;
        } catch {
          return null;
        }
      }

      function setWithExpiry(key, value, ttlMs) {
        const now = new Date().getTime();
        const item = { value, expiry: now + ttlMs };
        localStorage.setItem(key, JSON.stringify(item));
      }

      function getWithExpiry(key) {
        const itemStr = localStorage.getItem(key);
        if (!itemStr) return null;
        try {
          const item = JSON.parse(itemStr);
          if (new Date().getTime() > item.expiry) {
            localStorage.removeItem(key);
            return null;
          }
          return item.value;
        } catch {
          return null;
        }
      }

      const ONE_WEEK_MS = 7 * 24 * 60 * 60 * 1000;

      async function startQuizSession(quizId) {
        const sessionKey = `quiz_${quizId}_sessionId`;
        if (localStorage.getItem(sessionKey)) return localStorage.getItem(sessionKey);

        try {
          let endpoint, body;
          if (isFiftyPlusQuiz()) {
            const emailAddress = await getWordPressUserEmail();
            endpoint = 'https://weeklyfifty-7617b.web.app/api/logFiftyPlusQuizStart';
            body = JSON.stringify({ quizId, emailAddress });
          } else {
            endpoint = 'https://weeklyfifty-7617b.web.app/api/logQuizStart';
            body = JSON.stringify({ quizId });
          }
          const response = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body
          });
          if (!response.ok) throw new Error('Failed to start quiz session');
          const data = await response.json();
          localStorage.setItem(sessionKey, data.sessionId);
          return data.sessionId;
        } catch (err) {
          console.error('Error starting quiz session:', err);
          return null;
        }
      }

      async function finishQuizSession(quizIndex) {
        const quizId = String(quizzes[quizIndex].quiz_id);
        const sessionKey = `quiz_${quizId}_sessionId`;
        const sessionId = localStorage.getItem(sessionKey);
        if (!sessionId) return;

        const totalQuestions = quizzes[quizIndex].questions.length;
        const score = scoreCount[quizIndex];
        const answers = quizzes[quizIndex].questions.map((q, idx) => {
          const key = `${quizIndex}_${idx}`;
          return {
            questionId: q.qNum,
            correct: correctClicked[quizIndex * 50 + idx],
            timestamp: answerTimestamps[key] || null,
          };
        });

        try {
          const endpoint = isFiftyPlusQuiz()
            ? 'https://weeklyfifty-7617b.web.app/api/logFiftyPlusQuizFinish'
            : 'https://weeklyfifty-7617b.web.app/api/logQuizFinish';
          const response = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId, score, total: totalQuestions, answers }),
          });
          if (!response.ok) throw new Error('Failed to finish quiz session');
          console.log('Quiz session saved:', await response.json());
        } catch (err) {
          console.error('Error finishing quiz session:', err);
        }
      }

      async function checkQuizCompletion(quizIndex) {
        const quizId = String(quizzes[quizIndex].quiz_id);
        const quizSessionKey = `quiz_${quizId}_submitted`;
        if (getWithExpiry(quizSessionKey)) return;

        const totalQuestions = quizzes[quizIndex].questions.length;
        let answeredCount = 0;
        for (let j = 0; j < totalQuestions; j++) {
          const idx = quizIndex * 50 + j;
          if (correctClicked[idx] || incorrectClicked[idx]) answeredCount++;
        }

        if (answeredCount === 1) {
          await startQuizSession(quizId);
        }

        if (answeredCount === totalQuestions) {
          setWithExpiry(quizSessionKey, 'true', ONE_WEEK_MS);
          quizSubmitted[quizIndex] = true;
          for (let j = 0; j < totalQuestions; j++) {
            disableButton(0, quizIndex, j);
          }
          await finishQuizSession(quizIndex);
        }
      }

      function formatDeploymentDate(dateString) {
        return new Intl.DateTimeFormat('en-AU', {
          day: '2-digit',
          month: '2-digit',
          year: 'numeric',
          timeZone: 'Australia/Adelaide'
        }).format(new Date(dateString));
      }

      function createTopContainer() {
        var quizElement = document.getElementById('load');
        var topContainerDiv = document.createElement('div');
        topContainerDiv.className = 'topContainer';

        var infoButton = document.createElement('button');
        infoButton.className = 'info-button';
        infoButton.id = 'infoBtn';
        infoButton.innerHTML = '︎First timers<br /><b>click me!</b>';
        infoButton.onclick = function () {
          modal.style.display = 'block';
        };

        var modalDiv = document.createElement('div');
        modalDiv.id = 'infoModal';
        modalDiv.className = 'modal';

        var modalContentDiv = document.createElement('div');
        modalContentDiv.className = 'modal-content';

        var closeButton = document.createElement('span');
        closeButton.className = 'close';
        closeButton.innerHTML = '&times;';

        var infoParagraph = document.createElement('p');
        infoParagraph.className = 'info';
        infoParagraph.innerHTML =
          'Welcome to the Fifty. <br> First time? Easy. <br> <br> Once you\'ve settled on your answer, click on the question to see if you\'re correct. Mark accordingly. <br> <br> If you don\'t want your answers straight away, no stress. There\'s a \'gimme the answers\' button down below. Just have a notepad handy, and scroll gently. <br> <br> Happy quizzing! <br> All our love, <br> The Weekly Fifty xx';

        modalContentDiv.appendChild(closeButton);
        modalContentDiv.appendChild(infoParagraph);
        modalDiv.appendChild(modalContentDiv);

        var toggleButtonContainerWrapperDiv = document.createElement('div');
        toggleButtonContainerWrapperDiv.className = 'toggleButtonContainerWrapper';

        var toggleButtonContainerQuestionsDiv = document.createElement('div');
        toggleButtonContainerQuestionsDiv.className = 'toggleButtonContainer';

        var toggleWithValuesQuestionsDiv = document.createElement('div');
        toggleWithValuesQuestionsDiv.id = 'quizNightSwitch';
        toggleWithValuesQuestionsDiv.className = 'toggleWithValues';
        toggleWithValuesQuestionsDiv.innerHTML =
          '<label class="toggleButtonLabel" for="toggleButton">Been To A Quiz Night</label><label class="toggleButton"><input type="checkbox" id="quizNightToggleButton" onchange="toggleQuestions()"><span class="slider"></span></label>';

        toggleButtonContainerQuestionsDiv.appendChild(toggleWithValuesQuestionsDiv);
        toggleButtonContainerWrapperDiv.appendChild(toggleButtonContainerQuestionsDiv);
        topContainerDiv.appendChild(infoButton);
        topContainerDiv.appendChild(modalDiv);
        topContainerDiv.appendChild(toggleButtonContainerWrapperDiv);
        quizElement.appendChild(topContainerDiv);

        var modal = modalDiv;

        closeButton.onclick = function () {
          modal.style.display = 'none';
        };

        window.addEventListener('click', function (event) {
          if (event.target == modal) {
            modal.style.display = 'none';
          }
        });
      }

      function createImage() {
        var imageUrl = quizzes[0].imageUrl;
        if (!imageUrl) return;
        var quizElement = document.getElementById('load');
        var img = document.createElement('img');
        img.className = 'quizImage';
        img.src = imageUrl;
        img.alt = quizzes[0].quizTitle || '';
        quizElement.appendChild(img);
      }

      function createTitle() {
        var quizElement = document.getElementById('load');
        var title = document.createElement('div');
        title.className = 'quizTitle';
        title.innerText = 'Quiz ' + quizzes[0].quiz_id + ' - ' + formatDeploymentDate(quizzes[0].deploymentDate);
        quizElement.appendChild(title);
      }

      function createNotesAbove() {
        var notes = quizzes[0].notesAbove;
        if (!notes) return;
        var quizElement = document.getElementById('load');
        var notesDiv = document.createElement('div');
        notesDiv.className = 'quizNotes';
        notesDiv.innerHTML = notes;
        quizElement.appendChild(notesDiv);
      }

      function createNotesBelow() {
        var notes = quizzes[0].notesBelow;
        if (!notes) return;
        var quizElement = document.getElementById('load');
        var notesDiv = document.createElement('div');
        notesDiv.className = 'quizNotes';
        notesDiv.innerHTML = notes;
        quizElement.appendChild(notesDiv);
      }

      function createQuizContainers() {
        var page = document.getElementById('load');
        var cont = document.createElement('div');
        cont.className = 'quizContainer';
        page.appendChild(cont);

        for (let i = 0; i < quizzes.length; i++) {
          var quiz = document.createElement('div');
          quiz.className = i === 0 ? 'quiz active' : 'quiz';
          quiz.id = 'quiz_' + (i + 1);
          cont.appendChild(quiz);
          createQuiz(i, quizzes[i].questions);
        }
      }

      function createQuiz(id, questions) {
        var quiz = document.getElementsByClassName('quiz');
        for (let i = 0; i < questions.length; i++) {
          let idCode = (id + 1) + '_' + (i + 1);

          var questionDiv = document.createElement('div');
          questionDiv.className = 'question';
          questionDiv.id = 'clickQuestion_' + idCode;

          var accordionButton = document.createElement('button');
          accordionButton.className = 'accordionButton';
          accordionButton.id = 'button_' + idCode;

          var dotSpan = document.createElement('span');
          dotSpan.className = 'dot';
          dotSpan.id = 'dot_' + idCode;
          dotSpan.appendChild(document.createTextNode(' '));

          var questionText = document.createElement('span');
          questionText.className = 'questionText';
          questionText.innerHTML = '<b>' + (i + 1) + '. </b>' + questions[i].qTitle;

          accordionButton.appendChild(dotSpan);
          accordionButton.appendChild(questionText);
          accordionButton.onclick = toggleAccordion;

          var clickPanel = document.createElement('div');
          clickPanel.className = 'panel';

          var answerButton = document.createElement('button');
          answerButton.className = 'genericButton';
          answerButton.id = 'clickAnswer_' + idCode;
          answerButton.textContent = 'Click for answer';
          answerButton.onclick = togglePanel;

          var answerPanel = document.createElement('div');
          answerPanel.className = 'panel answer';

          var answerText = document.createElement('p');
          answerText.className = 'answerText';
          answerText.innerHTML = questions[i].qAnswer;

          var correctButton = document.createElement('button');
          correctButton.className = 'genericButton';
          correctButton.id = 'clickCorrectBtn_' + idCode;
          correctButton.textContent = 'Correct';
          correctButton.onclick = function () {
            disableButton(1, id, i);
            incrementScore(1, id, i);
            removeDot(id + 1, i + 1);
            answerTimestamps[`${id}_${i}`] = new Date().toISOString();
          };

          var incorrectButton = document.createElement('button');
          incorrectButton.className = 'genericButton';
          incorrectButton.id = 'clickIncorrectBtn_' + idCode;
          incorrectButton.textContent = 'Incorrect';
          incorrectButton.onclick = function () {
            disableButton(2, id, i);
            incrementScore(2, id, i);
            removeDot(id + 1, i + 1);
            answerTimestamps[`${id}_${i}`] = new Date().toISOString();
          };

          quiz[id].appendChild(questionDiv);
          questionDiv.appendChild(accordionButton);
          questionDiv.appendChild(clickPanel);
          clickPanel.appendChild(answerButton);
          clickPanel.appendChild(answerPanel);
          answerPanel.appendChild(answerText);
          answerPanel.appendChild(correctButton);
          answerPanel.appendChild(incorrectButton);
        }
      }

      function createScore() {
        var quiz = document.getElementsByClassName('quiz');
        for (let i = 0; i < quizzes.length; i++) {
          var scoreDiv = document.createElement('div');
          scoreDiv.className = 'score';
          scoreDiv.id = 'score_' + (i + 1);
          scoreDiv.innerHTML =
            'Score: <span id="scoreCount_' + (i + 1) + '">0</span> / <span id="totalCount_' + (i + 1) + '">0</span>';
          quiz[i].appendChild(scoreDiv);
        }
      }

      function toggleQuestions() {
        let toggleButton = document.getElementById('quizNightToggleButton');
        let displayQuestions = toggleButton.checked ? 20 : 50;
        let questions = document.getElementsByClassName('question');
        if (displayQuestions === 20) {
          for (var i = 0; i < 30; i++) {
            questions[i].style.display = 'none';
          }
        } else {
          for (var i = 0; i < 50; i++) {
            questions[i].style.display = 'block';
          }
        }
      }

      function toggleAccordion() {
        this.classList.toggle('active');
        var panel = this.nextElementSibling;
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
      }

      function togglePanel() {
        this.classList.toggle('reveal');
        var panel = this.nextElementSibling;
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
      }

      function disableButton(buttonNum, quiz, pairNum) {
        var buttonPair = buttons[quiz * 50 + pairNum];
        var correctButton = buttonPair.correct;
        var incorrectButton = buttonPair.incorrect;

        if (buttonNum === 1) {
          correctButton.disabled = true;
          correctButton.classList.add('correct');
          incorrectButton.disabled = false;
          incorrectButton.classList.remove('incorrect');
        } else if (buttonNum === 2) {
          incorrectButton.disabled = true;
          incorrectButton.classList.add('incorrect');
          correctButton.disabled = false;
          correctButton.classList.remove('correct');
        }
      }

      function incrementScore(num, quiz, pairNum) {
        var buttonIndex = quiz * 50 + pairNum;
        if (num === 1) {
          if (!correctClicked[buttonIndex] && !incorrectClicked[buttonIndex]) {
            scoreCount[quiz]++;
            totalCount[quiz]++;
            correctClicked[buttonIndex] = true;
          } else if (incorrectClicked[buttonIndex]) {
            scoreCount[quiz]++;
            correctClicked[buttonIndex] = true;
          }
        } else if (num === 2) {
          if (!correctClicked[buttonIndex] && !incorrectClicked[buttonIndex]) {
            totalCount[quiz]++;
            incorrectClicked[buttonIndex] = true;
          } else if (correctClicked[buttonIndex] && !incorrectClicked[buttonIndex]) {
            scoreCount[quiz]--;
            incorrectClicked[buttonIndex] = true;
          } else if (correctClicked[buttonIndex]) {
            scoreCount[quiz]--;
            incorrectClicked[buttonIndex] = true;
          }
        }
        for (let i = 0; i < quizzes.length; i++) {
          document.getElementById(`scoreCount_${i + 1}`).innerText = scoreCount[i];
          document.getElementById(`totalCount_${i + 1}`).innerText = totalCount[i];
        }
        checkQuizCompletion(quiz);
      }

      function removeDot(quiz, pairNum) {
        document.getElementById(`dot_${quiz}_${pairNum}`).classList.add('removed');
      }

      function shareScore() {
        const quizNumber = quizzes[0].quiz_id;
        const scoreElement = document.querySelector('.score');
        const scoreText = scoreElement ? scoreElement.innerText : 'a mystery score';
        const scoreMatch = scoreText.match(/\d+/);
        const score = scoreMatch ? scoreMatch[0] : '??';
        const shareMessage = `The Weekly Fifty\nQuiz ${quizNumber}\nScore:  ${score}/50! 🎉\nTry at https://theweeklyfifty.com`;

        if (navigator.share) {
          navigator.share({
            title: 'My Weekly Fifty Score',
            text: shareMessage,
            url: 'https://theweeklyfifty.com',
          }).catch((err) => console.error('Share failed:', err));
        } else {
          navigator.clipboard.writeText(shareMessage).then(() => {
            alert('Score copied to clipboard! You can now paste it anywhere 😊');
          });
        }
      }

      function initPage() {
        correctClicked = Array(quizzes.length * 50).fill(false);
        incorrectClicked = Array(quizzes.length * 50).fill(false);
        dotStatus = Array(quizzes.length * 50).fill('block');

        if (isFiftyPlusQuiz()) {
          createImage();
        } else {
          createTopContainer();
          createTitle();
        }

        createNotesAbove();
        createQuizContainers();
        createScore();
        createNotesBelow();

        for (var i = 0; i < quizzes.length; i++) {
          for (var j = 0; j < quizzes[i].questions.length; j++) {
            buttons.push({
              correct: document.getElementById(`clickCorrectBtn_${i + 1}_${j + 1}`),
              incorrect: document.getElementById(`clickIncorrectBtn_${i + 1}_${j + 1}`),
              dot: document.getElementById(`dot_${i + 1}_${j + 1}`),
            });
          }
        }
      }

      async function loadQuiz() {
        try {
          let data;
          if (isFiftyPlusQuiz()) {
            const slug = getSlugFromUrl();
            const response = await fetch('https://weeklyfifty-7617b.web.app/api/getQuizByQuizSlug?quizSlug=' + encodeURIComponent(slug));
            if (!response.ok) throw new Error('Network response was not ok');
            data = await response.json();
          } else {
            const response = await fetch('https://weeklyfifty-7617b.web.app/api/getLatestQuiz');
            if (!response.ok) throw new Error('Network response was not ok');
            data = await response.json();
          }

          quizzes = Array.isArray(data) ? data : [data];
          quizSubmitted = Array(quizzes.length).fill(false);
          scoreCount = Array(quizzes.length).fill(0);
          totalCount = Array(quizzes.length).fill(0);

          applyTheme();
          initPage();
        } catch (error) {
          console.error('Error fetching quiz:', error);
          document.getElementById('load').innerText = 'Failed to load quiz. Please try again later.';
        }
      }

      loadQuiz();
    </script>
  </body>
</html>
